services:
  - type: web
    name: media-downloader
    env: python
    plan: free
    # Install ffmpeg (needed by yt-dlp to merge video+audio) then install Python deps
    buildCommand: "apt-get update -y && apt-get install -y ffmpeg && pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn app:app --workers 2 --timeout 300 --bind 0.0.0.0:$PORT --log-level info"
    healthCheckPath: /api/status
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
    # No disk mount needed — all files go to /tmp and are auto-deleted after download
